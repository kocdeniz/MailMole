version: '3.8'

services:
  mailmole:
    build: .
    container_name: mailmole
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - MAILMOLE_LOG_LEVEL=info
      - MAILMOLE_DATA_DIR=/data
    restart: unless-stopped
    networks:
      - mailmole-network

networks:
  mailmole-network:
    driver: bridge

volumes:
  mailmole-data:
    driver: local
